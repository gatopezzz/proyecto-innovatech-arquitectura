version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: innovatech_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: innovatech_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: adminpassword
    ports:
      - "3306:3306"
    networks:
      - private_net
    volumes:
      - db_data:/var/lib/mysql

  backend-ventas:
    image: gatopezzz/innovatech-deploy-backend-ventas:latest
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: backend_ventas
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/innovatech_db?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword
    ports:
      - "8081:8080"
    networks:
      - private_net
      - public_net
    depends_on:
      - db

  backend-despachos:
    image: gatopezzz/innovatech-deploy-backend-despachos:latest
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: backend_despachos
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/innovatech_db?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword
    ports:
      - "8082:8080"
    networks:
      - private_net
      - public_net
    depends_on:
      - db

  frontend:
    image: gatopezzz/innovatech-deploy-frontend:latest
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: frontend_app
    restart: always
    ports:
      - "80:8080"
    networks:
      - public_net
    depends_on:
      - backend-ventas
      - backend-despachos

networks:
  public_net:
    driver: bridge
  private_net:
    driver: bridge

volumes:
  db_data:
    name: innovatech_db_data