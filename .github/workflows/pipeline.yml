name: CI/CD Pipeline Innovatech

# La rúbrica exige que el trigger sea en la rama 'deploy'
on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clonar el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v3

      # Paso 2: Iniciar sesión en Docker Hub usando tus Secrets
      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Paso 3: Construir las imágenes con Docker Compose V2
      - name: Construir imágenes
        run: docker compose build

      # Paso 4: Subir las imágenes a Docker Hub
      - name: Subir imágenes a Docker Hub
        run: docker compose push

      # Paso 5: Copiar el archivo docker-compose.yml a la máquina EC2
      - name: Copiar docker-compose al servidor EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/innovatech-deploy"

      # Paso 6: Conectarse por SSH a la EC2, descargar las imágenes nuevas y levantar todo
      - name: Desplegar en EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/innovatech-deploy
            # Usamos docker-compose con guion para el servidor de AWS
            docker-compose pull
            docker-compose up -d --remove-orphans